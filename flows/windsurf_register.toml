[flow]
name = "WindSurf Register (MVP)"
start_url = "https://windsurf.com/account/register?migrated=true"
timeout_ms = 5000

[selectors.email]
by = "css"
value = "input[name=\"email\"]"

[selectors.first_name]
by = "css"
value = "input[placeholder=\"Your first name\"]"

[selectors.last_name]
by = "css"
value = "input[placeholder=\"Your last name\"]"

[selectors.terms]
by = "id"
value = "auth1-agree-tos"

[selectors.continue_btn]
by = "css"
value = "button[type=\"submit\"]"

[selectors.password]
by = "css"
value = "input[name=\"password\"]"

[selectors.password_confirm]
by = "css"
value = "input[name=\"confirmPassword\"]"

[selectors.otp_input]
by = "css"
value = "input[autocomplete=\"one-time-code\"]"

[[steps]]
action = "navigate"

[[steps]]
action = "wait"
target = "email"
state = "present"

[[steps]]
action = "type"
target = "first_name"
value = "{account.first_name}"
optional = true

[[steps]]
action = "type"
target = "last_name"
value = "{account.last_name}"
optional = true

[[steps]]
action = "type"
target = "email"
value = "{account.email}"

[[steps]]
action = "click"
target = "terms"

[[steps]]
action = "wait"
target = "continue_btn"
state = "clickable"
timeout_ms = 5000

[[steps]]
action = "click"
target = "continue_btn"

[[steps]]
action = "wait"
target = "password"
state = "visible"

[[steps]]
action = "type"
target = "password"
value = "{account.password}"

[[steps]]
action = "type"
target = "password_confirm"
value = "{account.password}"

[[steps]]
action = "wait"
target = "continue_btn"
state = "clickable"
timeout_ms = 5000

[[steps]]
action = "click"
target = "continue_btn"


[[steps]]
action = "wait"
target = "otp_input"
state = "visible"
timeout_ms = 5000

[[steps]]
action = "wait_otp"

[[steps]]
action = "type_otp_digits"
target = "otp_input"
value = "{verification.code}"

[[steps]]
action = "wait_onboarding_source"
